services:
  - type: web
    name: sityy
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sityy-db
          property: connectionString

databases:
  - name: sityy-db
    plan: free

